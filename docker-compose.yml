services:
  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "5000"
      WEIGHT_DB_PATH: /data/weight_records.db
    volumes:
      - weight-data:/data
    expose:
      - "5000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - app
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  weight-data:
  caddy-data:
  caddy-config:
